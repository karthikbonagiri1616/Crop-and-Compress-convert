<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Master Minds - The Learning Hub - Image Tool</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:"Segoe UI",sans-serif;
    background:#0f172a;
    color:#fff;
    padding:20px;
}

/* HEADER */
h1{text-align:center;font-size:2.2em;}
h2{text-align:center;color:#cbd5f5;margin-bottom:10px;}
p{text-align:center;color:#e2e8f0;margin-bottom:20px;}

/* CARD */
.card{
    max-width:1200px;
    margin:auto;
    background:#fff;
    color:#111;
    border-radius:15px;
    padding:25px;
}

/* CONTROLS */
.controls{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
    justify-content:center;
}
.control-group{display:flex;flex-direction:column;}

input,select{
    padding:10px;
    border-radius:8px;
    border:1px solid #ddd;
}

/* BUTTON COLORS */
button{
    border:none;
    padding:10px 15px;
    border-radius:8px;
    cursor:pointer;
}

.upload-btn{background:#f97316;color:#fff;}
.bulk-btn{background:#020617;color:#fff;}
.compress-btn{background:#2563eb;color:#fff;width:100%;margin-top:8px;}
.crop-btn{background:#ec4899;color:#fff;width:100%;margin-top:6px;}
.remove-btn{background:red;color:#fff;position:absolute;top:5px;right:5px;}

/* DROP */
.drop{
    border:2px dashed #f97316;
    background:#fff7ed;
    padding:40px;
    text-align:center;
    border-radius:12px;
    color:#ea580c;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
    gap:15px;
}
.item{
    background:#fff;
    border-radius:10px;
    padding:10px;
    position:relative;
}
.thumb{
    width:100%;
    height:160px;
    object-fit:cover;
}

/* STATS */
.stats{
    display:flex;
    justify-content:space-around;
    margin:15px 0;
    padding:10px;
    background:#f1f5f9;
    border-radius:8px;
}
.stat-value{color:#f97316;font-weight:bold;}

/* ALERT */
.warning{background:#fee2e2;color:#b91c1c;text-align:center;}
.success{background:#dcfce7;color:#15803d;text-align:center;}

/* ADS */
.ad-box{
    background:#020617;
    border:1px dashed #334155;
    text-align:center;
    padding:10px;
    margin:10px auto;
    border-radius:8px;
}

/* CROP MODAL */
#cropModal{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}
#cropImage{max-width:90%;}
#cropButtons{margin-top:10px;}

@media(max-width:768px){
    .controls{flex-direction:column;align-items:center;}
}
</style>
</head>

<body>

<h1>Master Minds - The Learning Hub</h1>
<h2>Compress, Convert & Crop Images</h2>
<p>Upload images, compress, crop and download easily.</p>

<div class="ad-box">Google Ads Top</div>

<div class="card">

<div class="controls">
<div class="control-group">
<label>Target Size (KB)</label>
<input id="sizeInput" type="number" value="500">
</div>

<div class="control-group">
<label>Format</label>
<select id="outFormat">
<option value="image/jpeg">JPG</option>
<option value="image/png">PNG</option>
<option value="image/webp">WEBP</option>
</select>
</div>

<button class="upload-btn" onclick="document.getElementById('fileInput').click()">Upload</button>
<input id="fileInput" type="file" multiple style="display:none">

<button class="bulk-btn" id="bulkDownload">Download All</button>
</div>

<div class="stats">
<div><span id="totalImages">0</span><br>Total</div>
<div><span id="totalSize">0 KB</span><br>Size</div>
<div><span id="estimatedSize">0 KB</span><br>Estimate</div>
</div>

<div class="warning" id="bulkWarning"></div>
<div class="success" id="successMessage"></div>

<div id="dropArea" class="drop">
Drag & Drop Images Here
</div>

<div id="results" class="grid"></div>

</div>

<div class="ad-box">Google Ads Bottom</div>

</script>

</body>
</html>
