<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Master Minds - The Learning Hub | Image Tool</title>

<!-- Cropper.js -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

<!-- Font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Inter',sans-serif;
    background:#0f172a;
    color:#fff;
}

/* HEADER */
h1{
    text-align:center;
    margin-top:20px;
    font-size:2.2rem;
}
h4{
    text-align:center;
    color:#cbd5f5;
}
p{
    text-align:center;
    color:#e2e8f0;
    max-width:650px;
    margin:10px auto 25px;
}

/* ADS */
.ad-box{
    max-width:1000px;
    margin:15px auto;
    padding:12px;
    border:1px dashed #334155;
    text-align:center;
    border-radius:8px;
    color:#94a3b8;
    background:#020617;
}

/* CARD */
.card{
    max-width:1200px;
    margin:auto;
    background:#fff;
    color:#111;
    border-radius:14px;
    padding:25px;
}

/* CONTROLS */
.controls{
    display:flex;
    flex-wrap:wrap;
    gap:15px;
    justify-content:center;
}
.control-group{
    display:flex;
    flex-direction:column;
    min-width:170px;
}
label{
    font-size:13px;
}

/* INPUT */
input,select{
    padding:10px;
    border-radius:8px;
    border:1px solid #ddd;
}

/* BUTTON */
button{
    border:none;
    padding:10px 16px;
    border-radius:8px;
    cursor:pointer;
    font-weight:600;
}

/* COLORS */
.upload-btn{background:#f97316;color:#fff;}
.bulk-btn{background:#020617;color:#fff;}

.compress-btn{
    background:#2563eb;
    color:#fff;
    width:100%;
    margin-top:10px;
}
.crop-btn{
    background:#ec4899;
    color:#fff;
    width:100%;
    margin-top:6px;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
    gap:20px;
}

/* ITEM */
.item{
    background:#fff;
    border-radius:12px;
    padding:12px;
    position:relative;
}
.thumb{
    width:100%;
    height:170px;
    object-fit:cover;
    border-radius:8px;
}
.remove-btn{
    position:absolute;
    top:8px;
    right:8px;
    background:red;
    color:#fff;
}

/* DROP */
.drop{
    border:2px dashed #f97316;
    padding:50px;
    text-align:center;
    border-radius:12px;
    background:#fff7ed;
    color:#ea580c;
}

/* STATS */
.stats{
    display:flex;
    justify-content:space-around;
    margin:15px 0;
    padding:15px;
    background:#f1f5f9;
    border-radius:10px;
}
.stat-value{
    color:#f97316;
    font-weight:bold;
}

/* ALERT */
.warning{
    background:#fee2e2;
    color:#b91c1c;
    padding:10px;
    text-align:center;
}
.success{
    background:#dcfce7;
    color:#15803d;
    padding:10px;
    text-align:center;
}

/* MOBILE */
@media(max-width:768px){
    .controls{flex-direction:column;}
}

</style>
</head>

<body>

<h1>Master Minds - The Learning Hub</h1>
<h4>Compress, Convert & Crop Images</h4>
<p>Upload or drop images, compress, crop, and download easily.</p>

<div class="ad-box">Google AdSense Top Banner</div>

<div class="card">

<div class="controls">
<div class="control-group">
<label>Target Size (KB)</label>
<input id="sizeInput" type="number" value="500">
</div>

<div class="control-group">
<label>Format</label>
<select id="outFormat">
<option value="image/jpeg">JPG</option>
<option value="image/png">PNG</option>
<option value="image/webp">WEBP</option>
</select>
</div>

<button class="upload-btn" onclick="fileInput.click()">Upload</button>
<input id="fileInput" type="file" multiple style="display:none">

<button class="bulk-btn" id="bulkDownload">Download All</button>
</div>

<div class="stats">
<div><span id="totalImages">0</span><br>Total</div>
<div><span id="totalSize">0 KB</span><br>Size</div>
<div><span id="estimatedSize">0 KB</span><br>Estimate</div>
</div>

<div id="dropArea" class="drop">Drag & Drop Images</div>

<div id="results" class="grid"></div>

</div>

<div class="ad-box">Google AdSense Bottom Banner</div>

<!-- ⚠️ KEEP YOUR ORIGINAL JS BELOW (NO CHANGE) -->
<script>
/* PASTE YOUR ORIGINAL JS HERE WITHOUT CHANGES */
</script>

</body>
</html>
