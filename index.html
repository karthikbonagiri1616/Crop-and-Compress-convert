<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Master Minds-The Learning Hub - Compress, Convert & Crop Images</title>

<!-- Cropper -->

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

<style>
* {margin:0;padding:0;box-sizing:border-box;}

body {
    font-family: "Segoe UI", sans-serif;
    padding:20px;
    background: linear-gradient(135deg, #ff7eb3, #ff758c);
    color:#fff;
}

h1,h2,h4,p {text-align:center;}

.card {
    max-width:1200px;
    margin:auto;
    background:#fff;
    color:#333;
    border-radius:20px;
    padding:25px;
}

.controls {
    display:flex;
    gap:15px;
    flex-wrap:wrap;
    justify-content:center;
    margin-bottom:20px;
}

.control-group {display:flex;flex-direction:column;}

input,select {
    padding:10px;
    border-radius:10px;
    border:2px solid #ddd;
}

button {
    padding:10px 15px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.upload-btn {background:#667eea;color:#fff;}
.bulk-btn {background:#ff758c;color:#fff;}
.compress-btn {background:#667eea;color:#fff;width:100%;margin-top:8px;}
.crop-btn {background:#ffb347;color:#fff;width:100%;margin-top:8px;}
.remove-btn {background:red;color:#fff;position:absolute;top:5px;right:5px;}

.drop {
    border:2px dashed #ff758c;
    padding:40px;
    text-align:center;
    margin-bottom:20px;
    cursor:pointer;
}

.grid {
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
    gap:15px;
}

.item {
    background:#fafafa;
    border-radius:15px;
    padding:10px;
    position:relative;
}

.thumb {
    width:100%;
    height:150px;
    object-fit:cover;
    border-radius:10px;
}

.meta small {display:block;}

.stats {
    display:flex;
    justify-content:space-between;
    margin:10px 0;
}

.warning {color:red;text-align:center;}
.success {color:green;text-align:center;}

/* ✅ Crop Modal FIXED */
#cropModal {
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.95);
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:9999;
}

#cropContainer {max-width:90%;max-height:75%;}
#cropImage {max-width:100%;max-height:70vh;border:3px solid #fff;border-radius:10px;}

#cropButtons {margin-top:15px;display:flex;gap:10px;}

.crop-save-btn {background:green;color:#fff;padding:10px 20px;}
.crop-cancel-btn {background:red;color:#fff;padding:10px 20px;}

#cropClose {
    position:absolute;
    top:15px;
    right:20px;
    font-size:30px;
    background:none;
    border:none;
    color:#fff;
    cursor:pointer;
}
</style>

</head>

<body>

<h1>Master Minds</h1>
<h2>The Learning Hub</h2>
<p>Compress, Convert & Crop Images</p>

<div class="card">

<!-- Adsense (Replace with your ID) -->

<ins class="adsbygoogle"
  style="display:block"
  data-ad-client="ca-pub-XXXX"
  data-ad-slot="XXXX"
  data-ad-format="auto"></ins>

<div class="controls">
    <div class="control-group">
        <label>Target Size KB</label>
        <input id="sizeInput" type="number" value="500">
    </div>

```
<div class="control-group">
    <label>Format</label>
    <select id="outFormat">
        <option value="image/jpeg">JPG</option>
        <option value="image/png">PNG</option>
        <option value="image/webp">WEBP</option>
    </select>
</div>

<button class="upload-btn" onclick="fileInput.click()">Upload</button>
<input type="file" id="fileInput" multiple hidden>

<button class="bulk-btn" id="bulkDownload">Download All</button>
```

</div>

<div class="stats">
    <div>Total: <span id="totalImages">0</span></div>
    <div>Size: <span id="totalSize">0 KB</span></div>
</div>

<div id="dropArea" class="drop">Drop Images Here</div>

<div id="results" class="grid"></div>

<div class="warning" id="bulkWarning"></div>
<div class="success" id="successMessage"></div>

</div>

<!-- Crop Modal -->

<div id="cropModal">
    <button id="cropClose">&times;</button>
    <div id="cropContainer">
        <img id="cropImage">
    </div>
    <div id="cropButtons">
        <button id="cropSave" class="crop-save-btn">Save</button>
        <button id="cropCancel" class="crop-cancel-btn">Cancel</button>
    </div>
</div>

<script>
const fileInput=document.getElementById('fileInput');
const results=document.getElementById('results');
const sizeInput=document.getElementById('sizeInput');
const outFormat=document.getElementById('outFormat');
const cropModal=document.getElementById('cropModal');
const cropImage=document.getElementById('cropImage');

let items=[];
let cropper=null;
let currentCropItem=null;

fileInput.onchange=()=>handleFiles([...fileInput.files]);

function handleFiles(files){
files.forEach(file=>{
let url=URL.createObjectURL(file);
let obj={file,url,element:null};
items.push(obj);
renderItem(obj);
});
}

function renderItem(obj){
let el=document.createElement('div');
el.className='item';

el.innerHTML=`
<img class="thumb" src="${obj.url}">
<div class="meta">
<small>${obj.file.name}</small>
</div>
<button class="crop-btn">Crop</button>
<button class="compress-btn">Download</button>
<button class="remove-btn">X</button>
`;

results.appendChild(el);
obj.element=el;

el.querySelector('.remove-btn').onclick=()=>el.remove();
el.querySelector('.crop-btn').onclick=()=>openCrop(obj);
el.querySelector('.compress-btn').onclick=()=>download(obj);
}

function openCrop(obj){
currentCropItem=obj;
cropImage.src=obj.url;
cropModal.style.display='flex';

if(cropper) cropper.destroy();

setTimeout(()=>{
cropper=new Cropper(cropImage,{viewMode:1});
},200);
}

function saveCrop(){
let canvas=cropper.getCroppedCanvas();

canvas.toBlob(blob=>{
let file=new File([blob],currentCropItem.file.name);
currentCropItem.file=file;
currentCropItem.url=URL.createObjectURL(file);

currentCropItem.element.querySelector('.thumb').src=currentCropItem.url;

closeCrop();
});
}

function closeCrop(){
if(cropper){cropper.destroy();cropper=null;}
cropModal.style.display='none';
}

function download(obj){
let a=document.createElement('a');
a.href=obj.url;
a.download=obj.file.name;
a.click();
}

document.getElementById('cropSave').onclick=saveCrop;
document.getElementById('cropCancel').onclick=closeCrop;
document.getElementById('cropClose').onclick=closeCrop;
</script>

</body>
</html>
